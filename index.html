<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal IQP - Cobli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script> 
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cobli-green': '#00A859',
                        'cobli-red': '#FF3B30',
                        'cobli-dark': '#1A1A1A',
                        'cobli-light': '#007AFF'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans">
    
    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-cobli-dark">Portal de Qualidade (IQP)</h1>
        <div class="flex items-center gap-4">
            <span id="user-name-display" class="font-semibold text-gray-700">Carregando...</span>
            <button onclick="fazerLogout()" class="text-sm text-cobli-red border border-cobli-red px-3 py-1 rounded hover:bg-red-50 transition">Sair</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <div class="bg-white p-4 rounded-lg shadow mb-6 flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mês</label>
                <input type="month" id="filtro-mes" class="border border-gray-300 rounded p-2 outline-none">
            </div>
            <div id="container-filtro-prestador" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">Prestador</label>
                <select id="filtro-prestador" class="border border-gray-300 rounded p-2 min-w-[250px] outline-none">
                    <option value="">Todos os Prestadores</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-green">
                <h3 class="text-gray-500 text-xs font-bold uppercase">Score Médio (IQP)</h3>
                <div class="flex items-baseline gap-2 mt-2">
                    <p id="metric-score" class="text-4xl font-bold text-cobli-dark">--</p>
                    <span id="medal-display" class="text-sm font-bold px-2 py-0.5 rounded"></span>
                </div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-red">
                <h3 class="text-gray-500 text-xs font-bold uppercase">Total de Ordens</h3>
                <p id="metric-os" class="text-4xl font-bold text-cobli-red mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-light">
                <h3 class="text-gray-500 text-xs font-bold uppercase">Dispositivos</h3>
                <p id="metric-devices" class="text-4xl font-bold text-cobli-light mt-2">--</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Ordem de Serviço</th>
                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Data</th>
                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-center text-xs font-bold text-gray-500 uppercase">Qtd</th>
                        <th class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase">Score</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-200 bg-white"></tbody>
            </table>
            <div id="no-data-msg" class="p-8 text-center text-gray-500 hidden">Nenhum dado encontrado.</div>
        </div>
    </main>

    <script>
        // Mudamos o nome da variável para supabaseClient para evitar conflitos!
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let perfilUsuario = null;

        window.onload = async () => {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) { window.location.href = 'login.html'; return; }

                const { data: perfil, error: errorPerfil } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
                
                if (errorPerfil) throw new Error("Erro ao buscar perfil: " + errorPerfil.message);
                
                if (perfil) {
                    perfilUsuario = perfil;
                    document.getElementById('user-name-display').textContent = perfil.nome_prestador;
                    if (perfil.permissao === 'admin') {
                        document.getElementById('container-filtro-prestador').classList.remove('hidden');
                        carregarListaPrestadores();
                    }
                    const hoje = new Date();
                    document.getElementById('filtro-mes').value = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
                    carregarDados();
                }
            } catch (err) {
                console.error(err);
                alert("Falha ao iniciar o portal: " + err.message);
            }
        };

        document.getElementById('filtro-mes').addEventListener('change', carregarDados);
        document.getElementById('filtro-prestador').addEventListener('change', carregarDados);

        async function carregarListaPrestadores() {
            const { data } = await supabaseClient.from('profiles').select('nome_prestador').eq('permissao', 'prestador');
            if (data) {
                const select = document.getElementById('filtro-prestador');
                data.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.nome_prestador; opt.textContent = p.nome_prestador;
                    select.appendChild(opt);
                });
            }
        }

        async function carregarDados() {
            try {
                const mes = document.getElementById('filtro-mes').value;
                const prestador = document.getElementById('filtro-prestador').value;
                
                // Tabela iqp
                let query = supabaseClient.from('iqp').select('*');

                if (mes) {
                    const [ano, m] = mes.split('-');
                    query = query.gte('data_servico', `${ano}-${m}-01`).lt('data_servico', `${ano}-${String(parseInt(m)+1).padStart(2, '0')}-01`);
                }

                if (perfilUsuario.permissao === 'prestador') {
                    query = query.eq('nome_prestador', perfilUsuario.nome_prestador);
                } else if (prestador) {
                    query = query.eq('nome_prestador', prestador);
                }

                const { data, error } = await query;
                
                if (error) throw new Error("Erro na tabela: " + error.message);
                
                renderDashboard(data || []);
            } catch (err) {
                console.error(err);
                alert("Erro ao carregar os dados: " + err.message);
            }
        }

        function renderDashboard(dados) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            const medalDisplay = document.getElementById('medal-display');
            
            if (dados.length === 0) {
                document.getElementById('no-data-msg').classList.remove('hidden');
                document.getElementById('metric-score').textContent = "0%";
                document.getElementById('metric-os').textContent = "0";
                document.getElementById('metric-devices').textContent = "0";
                medalDisplay.classList.add('hidden');
                return;
            }

            document.getElementById('no-data-msg').classList.add('hidden');
            let somaNotas = 0, totalDevs = 0;

            dados.forEach(os => {
                const nota = (parseFloat(os.score) || 0) * 100;
                somaNotas += nota;
                totalDevs += (parseInt(os.qtd_dispositivos) || 0);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm font-medium">${os.ordem_de_servico}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${new Date(os.data_servico).toLocaleDateString('pt-BR', {timeZone: 'UTC'})}</td>
                    <td class="px-6 py-4 text-sm text-gray-600 capitalize">${os.status || '-'}</td>
                    <td class="px-6 py-4 text-sm text-center">${os.qtd_dispositivos}</td>
                    <td class="px-6 py-4 text-sm text-right font-bold ${nota >= 85 ? 'text-cobli-green' : 'text-cobli-red'}">${nota.toFixed(0)}%</td>
                `;
                tableBody.appendChild(tr);
            });

            const media = Math.round(somaNotas / dados.length);
            document.getElementById('metric-score').textContent = `${media}%`;
            document.getElementById('metric-os').textContent = dados.length;
            document.getElementById('metric-devices').textContent = totalDevs;

            // Lógica das Medalhas
            medalDisplay.classList.remove('hidden');
            if (media >= 95) {
                medalDisplay.textContent = "💎 Diamante";
                medalDisplay.className = "text-sm font-bold px-2 py-0.5 rounded bg-blue-100 text-blue-700";
            } else if (media >= 85) {
                medalDisplay.textContent = "🥇 Ouro";
                medalDisplay.className = "text-sm font-bold px-2 py-0.5 rounded bg-yellow-100 text-yellow-700";
            } else if (media >= 60) {
                medalDisplay.textContent = "🥈 Prata";
                medalDisplay.className = "text-sm font-bold px-2 py-0.5 rounded bg-gray-200 text-gray-700";
            } else {
                medalDisplay.textContent = "🥉 Bronze";
                medalDisplay.className = "text-sm font-bold px-2 py-0.5 rounded bg-orange-100 text-orange-700";
            }
        }

        async function fazerLogout() { await supabaseClient.auth.signOut(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
