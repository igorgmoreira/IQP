<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Qualidade do Prestador - Cobli</title>
    
    <link rel="icon" type="image/png" href="logo-cobli.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --cobli-primary-dark: #07074E;
            --cobli-primary-light: #001BB8;
            --cobli-secondary-red: #FF4633;
            --cobli-secondary-green: #00AE97;
        }
        .bg-cobli-dark { background-color: var(--cobli-primary-dark); }
        .text-cobli-dark { color: var(--cobli-primary-dark); }
        .border-cobli-dark { border-color: var(--cobli-primary-dark); }
        .text-cobli-light { color: var(--cobli-primary-light); }
        .border-cobli-light { border-color: var(--cobli-primary-light); }
        .text-cobli-red { color: var(--cobli-secondary-red); }
        .text-cobli-green { color: var(--cobli-secondary-green); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96 border-t-4 border-cobli-dark">
            <div class="flex flex-col items-center justify-center mb-8 gap-5 mt-2">
                <img src="logotipo_slogan_indigo.png" alt="Cobli Logo" class="h-12">
                <h2 class="text-lg font-semibold text-cobli-dark text-center tracking-tight">Índice de Qualidade do Prestador</h2>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">E-mail</label>
                    <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-cobli-light">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Senha</label>
                    <input type="password" id="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-cobli-light">
                </div>
                <button type="submit" id="btn-entrar" class="w-full py-2 px-4 rounded-md text-white bg-cobli-dark hover:opacity-90 transition font-medium">Entrar</button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden min-h-screen">
        <header class="bg-cobli-dark text-white p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <img src="logotipo_slogan_branco.png" alt="Cobli Logo" class="h-10">
                <div class="flex items-center gap-6">
                    <span id="welcome-msg" class="text-sm font-medium opacity-90"></span>
                    <button id="logout-btn" class="text-cobli-red text-sm font-bold hover:underline">Sair</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                
                <h1 class="text-2xl font-bold text-cobli-dark">Índice de Qualidade do Prestador</h1>
                
                <div class="flex flex-wrap items-center gap-4">
                    <div id="admin-controls" class="hidden flex items-center gap-3 bg-white p-3 rounded-lg shadow-sm border border-cobli-dark">
                        <label class="text-sm font-semibold text-cobli-dark">Filtrar Prestador:</label>
                        <select id="admin-filter" class="outline-none border-b-2 border-cobli-dark bg-transparent font-bold text-cobli-dark cursor-pointer">
                            <option value="">Todos os Prestadores</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-3 bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                        <label class="text-sm font-semibold text-gray-600">Mês de Referência:</label>
                        <input type="month" id="date-filter" class="outline-none border-b-2 border-cobli-light bg-transparent text-cobli-light font-bold cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-green">
                    <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Score Médio (IQP)</h3>
                    <div class="flex items-baseline gap-2 mt-2">
                        <p id="metric-score" class="text-4xl font-bold text-cobli-green">--</p>
                        <span id="medal-display" class="text-sm font-bold px-2 py-0.5 rounded hidden"></span>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-red">
                    <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Total de Ordens</h3>
                    <p id="metric-os" class="text-4xl font-bold text-cobli-red mt-2">--</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-light">
                    <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Qtd. Dispositivos</h3>
                    <p id="metric-devices" class="text-4xl font-bold text-cobli-light mt-2">--</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-t-lg border-b border-gray-200 flex flex-col md:flex-row gap-4 items-center justify-between shadow-sm">
                <h3 class="text-sm font-bold text-gray-700 uppercase tracking-wider">Histórico de Ordens</h3>
                <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                    <input type="text" id="search-os" placeholder="Buscar por OS..." class="flex-1 md:w-64 px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-cobli-light">
                    <select id="search-status" class="flex-1 md:w-48 px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-cobli-light capitalize">
                        <option value="">Todos os Status</option>
                    </select>
                </div>
            </div>

            <div class="bg-white rounded-b-lg shadow border border-gray-200 overflow-hidden border-t-0">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-bold text-cobli-dark uppercase">OS</th>
                            <th id="th-prestador" class="hidden px-6 py-3 text-left text-xs font-bold text-cobli-dark uppercase">Prestador</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-cobli-dark uppercase">Data do Serviço</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-cobli-dark uppercase">Status</th>
                            <th class="px-6 py-3 text-center text-xs font-bold text-cobli-dark uppercase">Dispositivos</th>
                            <th class="px-6 py-3 text-right text-xs font-bold text-cobli-dark uppercase">Score</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
                <div id="no-data-msg" class="p-16 text-center text-gray-400 hidden">Nenhum dado encontrado para este período ou filtros.</div>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script>
        const clienteSupabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let currentUserProfile = null;
        let dadosGlobais = [];

        const dateFilter = document.getElementById('date-filter');
        const adminFilter = document.getElementById('admin-filter');
        const searchOsInput = document.getElementById('search-os');
        const searchStatusSelect = document.getElementById('search-status');

        function setInitialDate() {
            const now = new Date();
            dateFilter.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        }
        setInitialDate();

        // --- VERIFICAÇÃO DE SESSÃO AUTOMÁTICA AO CARREGAR A PÁGINA ---
        window.onload = async () => {
            const { data: { session } } = await clienteSupabase.auth.getSession();
            if (session) {
                carregarPerfilEIniciar(session.user.id);
            }
        };

        // --- NOVO LOGIN USANDO SUPABASE AUTH ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-entrar');
            btn.textContent = "Aguarde...";
            
            const { data, error } = await clienteSupabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });

            if (error) {
                document.getElementById('login-error').textContent = "E-mail ou senha incorretos.";
                document.getElementById('login-error').classList.remove('hidden');
                btn.textContent = "Entrar";
            } else {
                carregarPerfilEIniciar(data.user.id);
            }
        });

        // --- CARREGAR O PERFIL EXTRA DO USUÁRIO ---
        async function carregarPerfilEIniciar(userId) {
            const { data: profile, error } = await clienteSupabase
                .from('profiles')
                .select('*')
                .eq('id', userId)
                .single();

            if (error || !profile) {
                alert("Erro ao carregar perfil do usuário.");
                return;
            }

            currentUserProfile = profile;
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').textContent = profile.permissao === 'admin' ? `Admin: ${profile.nome_prestador}` : `Olá, ${profile.nome_prestador}`;
            
            if (profile.permissao === 'admin') {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('th-prestador').classList.remove('hidden'); // Exibe a coluna para Admin
                carregarListaPrestadores();
            }
            loadData();
        }

        async function carregarListaPrestadores() {
            const { data } = await clienteSupabase
                .from('profiles')
                .select('nome_prestador')
                .eq('permissao', 'prestador')
                .order('nome_prestador', { ascending: true });

            if (data) {
                const nomes = [...new Set(data.map(u => u.nome_prestador).filter(Boolean))];
                nomes.forEach(nomeLista => {
                    const option = document.createElement('option');
                    option.value = nomeLista;
                    option.textContent = nomeLista;
                    adminFilter.appendChild(option);
                });
            }
        }

        dateFilter.addEventListener('change', loadData);
        adminFilter.addEventListener('change', loadData);
        searchOsInput.addEventListener('input', aplicarFiltrosTabela);
        searchStatusSelect.addEventListener('change', aplicarFiltrosTabela);

        // --- BUSCA NO BANCO ---
        async function loadData() {
            if (!currentUserProfile) return;

            const [year, month] = dateFilter.value.split('-').map(Number);
            const primeiroDia = `${year}-${String(month).padStart(2, '0')}-01`;
            const proximoMes = month === 12 ? 1 : month + 1;
            const anoDoProximoMes = month === 12 ? year + 1 : year;
            const limiteSuperior = `${anoDoProximoMes}-${String(proximoMes).padStart(2, '0')}-01`;
            
            let query = clienteSupabase.from('iqp').select('*')
                .gte('data_servico', primeiroDia)
                .lt('data_servico', limiteSuperior)
                .order('data_servico', { ascending: false });

            // TRAVA DO PRESTADOR
            if (currentUserProfile.permissao === 'admin') {
                const prestadorEscolhido = adminFilter.value;
                if (prestadorEscolhido !== "") {
                    query = query.eq('prestador', prestadorEscolhido); 
                }
            } else {
                query = query.eq('prestador', currentUserProfile.nome_prestador); 
            }

            const { data, error } = await query;
            if (error) console.error(error);
            
            dadosGlobais = data || []; 
            searchOsInput.value = '';
            atualizarDropdownStatus(dadosGlobais);
            aplicarFiltrosTabela(); 
        }

        function atualizarDropdownStatus(dados) {
            const valorAtual = searchStatusSelect.value;
            searchStatusSelect.innerHTML = '<option value="">Todos os Status</option>';
            const statusUnicos = [...new Set(dados.map(item => (item.status || '-').toLowerCase()))].filter(Boolean);
            statusUnicos.forEach(status => {
                const option = document.createElement('option');
                option.value = status;
                option.textContent = status;
                searchStatusSelect.appendChild(option);
            });
            if (statusUnicos.includes(valorAtual)) searchStatusSelect.value = valorAtual;
        }

        function aplicarFiltrosTabela() {
            const termoOs = searchOsInput.value.toLowerCase().trim();
            const termoStatus = searchStatusSelect.value.toLowerCase();

            const dadosFiltrados = dadosGlobais.filter(os => {
                const matchOs = String(os.ordem_de_servico || '').toLowerCase().includes(termoOs);
                const matchStatus = termoStatus === "" || String(os.status || '-').toLowerCase() === termoStatus;
                return matchOs && matchStatus;
            });

            renderDashboard(dadosFiltrados);
        }

        function renderDashboard(dados) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            const medalDisplay = document.getElementById('medal-display');
            
            // Trava contra valores vazios (NaN)
            if (dados.length === 0) {
                document.getElementById('no-data-msg').classList.remove('hidden');
                document.getElementById('metric-score').textContent = "0%";
                document.getElementById('metric-os').textContent = "0";
                document.getElementById('metric-devices').textContent = "0";
                medalDisplay.classList.add('hidden'); // Esconde a medalha se não houver OS
                return;
            }

            document.getElementById('no-data-msg').classList.add('hidden');
            let somaNotas = 0, totalDispositivos = 0;
            const isAdmin = currentUserProfile && currentUserProfile.permissao === 'admin';

            dados.forEach(os => {
                const nota = (parseFloat(os.score) || 0) * 100;
                somaNotas += nota;
                totalDispositivos += (parseInt(os.qtd_dispositivos) || 0);

                const nomeDoPrestador = os.prestador || os.nome_prestador || '-';
                const tdPrestador = isAdmin ? `<td class="px-6 py-4 text-sm text-gray-500 max-w-[200px] truncate" title="${nomeDoPrestador}">${nomeDoPrestador}</td>` : '';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm font-semibold text-cobli-dark">${os.ordem_de_servico}</td>
                    ${tdPrestador}
                    <td class="px-6 py-4 text-sm text-gray-600">${new Date(os.data_servico).toLocaleDateString('pt-BR', { timeZone: 'UTC' })}</td>
                    <td class="px-6 py-4 text-sm text-gray-600 capitalize">${os.status || '-'}</td>
                    <td class="px-6 py-4 text-sm text-center text-gray-600">${os.qtd_dispositivos}</td>
                    <td class="px-6 py-4 text-sm text-right font-bold ${nota >= 80 ? 'text-cobli-green' : 'text-cobli-red'}">${nota.toFixed(0)}%</td>
                `;
                tableBody.appendChild(tr);
            });

            const media = Math.round(somaNotas / dados.length);
            document.getElementById('metric-score').textContent = `${media}%`;
            document.getElementById('metric-os').textContent = dados.length;
            document.getElementById('metric-devices').textContent = totalDispositivos;

            // --- Lógica das Medalhas ---
            medalDisplay.classList.remove('hidden');
            if (media >= 95) {
                medalDisplay.textContent = "💎 Diamante";
                medalDisplay.className = "text-sm font-bold px-2 py-0.5 rounded bg-blue-100 text-blue-700";
            } else if (media >= 85) {
                medalDisplay.textContent = "🥇 Ouro";
                medalDisplay.className = "text-sm font-bold px-2 py-0.5 rounded bg-yellow-100 text-yellow-700";
            } else if (media >= 60) {
                medalDisplay.textContent = "🥈 Prata";
                medalDisplay.className = "text-sm font-bold px-2 py-0.5 rounded bg-gray-200 text-gray-700";
            } else {
                medalDisplay.textContent = "🥉 Bronze";
                medalDisplay.className = "text-sm font-bold px-2 py-0.5 rounded bg-orange-100 text-orange-700";
            }
        }

        // --- LOGOUT OFICIAL DO SUPABASE ---
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await clienteSupabase.auth.signOut();
            location.reload();
        });
    </script>
</body>
</html>
