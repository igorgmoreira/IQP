<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Prestador - IQP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <div class="flex justify-center mb-6">
                <h1 class="text-2xl font-bold text-blue-600">Portal IQP</h1>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">E-mail</label>
                    <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Senha</label>
                    <input type="password" id="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full py-2 px-4 rounded-md text-white bg-blue-600 hover:bg-blue-700 transition font-medium">Entrar</button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden min-h-screen p-8">
        <div class="max-w-4xl mx-auto">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-3xl font-bold">Meu Desempenho</h1>
                    <p id="welcome-msg" class="text-gray-500"></p>
                </div>
                
                <div class="flex items-center gap-3 bg-white p-3 rounded-lg shadow-sm border">
                    <label class="text-sm font-semibold text-gray-600">Mês de Referência:</label>
                    <input type="month" id="date-filter" class="outline-none border-b-2 border-blue-500 bg-transparent text-blue-700 font-bold">
                    <button id="logout-btn" class="ml-4 px-3 py-1 bg-red-50 text-red-600 rounded text-sm hover:bg-red-100 font-medium">Sair</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-lg shadow border-t-4 border-blue-500">
                    <h3 class="text-gray-500 text-sm font-medium uppercase">Score Médio (IQP)</h3>
                    <p id="metric-score" class="text-4xl font-bold text-blue-600 mt-2">--</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow border-t-4 border-green-500">
                    <h3 class="text-gray-500 text-sm font-medium uppercase">Total de Ordens</h3>
                    <p id="metric-os" class="text-4xl font-bold text-green-600 mt-2">--</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow border-t-4 border-purple-500">
                    <h3 class="text-gray-500 text-sm font-medium uppercase">Qtd. Dispositivos</h3>
                    <p id="metric-devices" class="text-4xl font-bold text-purple-600 mt-2">--</p>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">OS</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Data do Serviço</th>
                            <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Dispositivos</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Nota Individual</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
                <div id="no-data-msg" class="p-10 text-center text-gray-400 hidden">Nenhum dado encontrado para este período.</div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        // 2. INICIALIZANDO O SUPABASE COM OS DADOS DO CONFIG.JS
        const clienteSupabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        const dateFilter = document.getElementById('date-filter');

        // 3. DEFINIR MÊS ATUAL COMO PADRÃO NO FILTRO
        function setInitialDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            dateFilter.value = `${year}-${month}`;
        }
        setInitialDate();

        // 4. LÓGICA DE LOGIN
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // Busca na tabela lendo as variáveis do CONFIG
            const { data: user, error } = await clienteSupabase
                .from(CONFIG.TABELA_USUARIOS)
                .select('*')
                .eq(CONFIG.COLUNA_EMAIL, email)
                .eq(CONFIG.COLUNA_SENHA, pass)
                .single();

            if (error || !user) {
                document.getElementById('login-error').textContent = "E-mail ou senha incorretos.";
                document.getElementById('login-error').classList.remove('hidden');
            } else {
                // Pega o nome usando o nome da coluna configurado
                const prestadorNome = user[CONFIG.COLUNA_NOME_PRESTADOR];
                localStorage.setItem('prestador_nome', prestadorNome);
                initDashboard(prestadorNome);
            }
        });

        // 5. INICIAR DASHBOARD
        function initDashboard(nome) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').textContent = `Olá, ${nome}`;
            loadData();
        }

        // 6. FILTRAR E BUSCAR DADOS
        dateFilter.addEventListener('change', loadData);

        async function loadData() {
            const nome = localStorage.getItem('prestador_nome');
            if (!nome) return;

            // Pega o primeiro e último dia do mês selecionado no filtro
            const [year, month] = dateFilter.value.split('-');
            const firstDay = `${year}-${month}-01`;
            const lastDay = `${year}-${month}-31`; 

            // Busca as ordens do mês
            const { data, error } = await clienteSupabase
                .from('iqp')
                .select('*')
                .eq('prestador', nome)
                .gte('data_servico', firstDay)
                .lte('data_servico', lastDay)
                .order('data_servico', { ascending: false });

            if (error) {
                console.error("Erro ao buscar dados:", error);
                return;
            }

            renderDashboard(data || []);
        }

        // 7. CALCULAR MÉDIAS E RENDERIZAR TABELA
        function renderDashboard(dados) {
            const tableBody = document.getElementById('table-body');
            const noData = document.getElementById('no-data-msg');
            tableBody.innerHTML = '';

            // Se não houver dados no mês
            if (dados.length === 0) {
                noData.classList.remove('hidden');
                document.getElementById('metric-score').textContent = "0.0%";
                document.getElementById('metric-os').textContent = "0";
                document.getElementById('metric-devices').textContent = "0";
                return;
            }

            noData.classList.add('hidden');

            let somaNotas = 0;
            let totalDispositivos = 0;

            dados.forEach(os => {
                // Multiplica por 100 para transformar 0.95 em 95
                const nota = (parseFloat(os.score) || 0) * 100; 
                somaNotas += nota;
                totalDispositivos += (parseInt(os.qtd_dispositivos) || 0);

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm font-bold text-gray-700">${os.ordem_de_servico}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${new Date(os.data_servico).toLocaleDateString('pt-BR', { timeZone: 'UTC' })}</td>
                    <td class="px-6 py-4 text-sm text-center text-gray-600">${os.qtd_dispositivos}</td>
                    <td class="px-6 py-4 text-sm text-right font-bold ${nota >= 80 ? 'text-green-600' : 'text-orange-500'}">${nota.toFixed(1)}%</td>
                `;
                tableBody.appendChild(tr);
            });

            // Calcula a média das notas
            const mediaFinal = (somaNotas / dados.length).toFixed(1);
            
            // Atualiza os painéis (Cards)
            document.getElementById('metric-score').textContent = `${mediaFinal}%`;
            document.getElementById('metric-os').textContent = dados.length;
            document.getElementById('metric-devices').textContent = totalDispositivos;
        }

        // 8. LOGOUT
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.clear();
            location.reload();
        });

        // 9. CHECAR SESSÃO AO CARREGAR A PÁGINA
        window.onload = () => {
            const salvo = localStorage.getItem('prestador_nome');
            if (salvo) {
                initDashboard(salvo);
            }
        };
    </script>
</body>
</html>
