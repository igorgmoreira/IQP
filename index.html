<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Qualidade do Prestador - Cobli</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Identidade Visual Cobli */
        :root {
            --cobli-primary-dark: #07074E;
            --cobli-primary-light: #001BB8;
            --cobli-secondary-red: #FF4633;
            --cobli-secondary-green: #00AE97;
        }
        .bg-cobli-dark { background-color: var(--cobli-primary-dark); }
        .text-cobli-dark { color: var(--cobli-primary-dark); }
        .border-cobli-dark { border-color: var(--cobli-primary-dark); }
        .text-cobli-light { color: var(--cobli-primary-light); }
        .border-cobli-light { border-color: var(--cobli-primary-light); }
        .text-cobli-red { color: var(--cobli-secondary-red); }
        .border-cobli-red { border-color: var(--cobli-secondary-red); }
        .text-cobli-green { color: var(--cobli-secondary-green); }
        .border-cobli-green { border-color: var(--cobli-secondary-green); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96 border-t-4 border-cobli-dark">
            <div class="flex flex-col items-center justify-center mb-6 gap-3">
                <img src="logotipo_slogan_indigo.png" alt="Cobli Logo" class="h-12">
                <h2 class="text-lg font-semibold text-cobli-dark text-center uppercase tracking-tight">
                    Índice de Qualidade do Prestador
                </h2>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">E-mail</label>
                    <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-cobli-light focus:border-cobli-light">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Senha</label>
                    <input type="password" id="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-cobli-light focus:border-cobli-light">
                </div>
                <button type="submit" class="w-full py-2 px-4 rounded-md text-white bg-cobli-dark hover:opacity-90 transition font-medium">Entrar</button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden min-h-screen">
        <header class="bg-cobli-dark text-white p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <img src="logotipo_slogan_branco.png" alt="Cobli Logo" class="h-10">
                <div class="flex items-center gap-6">
                    <span id="welcome-msg" class="text-sm font-medium opacity-90"></span>
                    <button id="logout-btn" class="text-cobli-red text-sm font-bold hover:underline">Sair</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <h1 class="text-2xl font-bold text-cobli-dark uppercase">Índice de Qualidade do Prestador</h1>
                
                <div class="flex flex-wrap items-center gap-4">
                    <div id="admin-controls" class="hidden flex items-center gap-3 bg-white p-3 rounded-lg shadow-sm border border-cobli-dark">
                        <label class="text-sm font-semibold text-cobli-dark">Filtrar Prestador:</label>
                        <select id="admin-filter" class="outline-none border-b-2 border-cobli-dark bg-transparent font-bold text-cobli-dark cursor-pointer">
                            <option value="">Todos os Prestadores</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-3 bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                        <label class="text-sm font-semibold text-gray-600">Mês de Referência:</label>
                        <input type="month" id="date-filter" class="outline-none border-b-2 border-cobli-light bg-transparent text-cobli-light font-bold cursor-pointer">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-green">
                    <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Score Médio (IQP)</h3>
                    <p id="metric-score" class="text-4xl font-bold text-cobli-green mt-2">--</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-red">
                    <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Total de Ordens</h3>
                    <p id="metric-os" class="text-4xl font-bold text-cobli-red mt-2">--</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-light">
                    <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Qtd. Dispositivos</h3>
                    <p id="metric-devices" class="text-4xl font-bold text-cobli-light mt-2">--</p>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-bold text-cobli-dark uppercase tracking-wider">Ordem de Serviço (OS)</th>
                            <th class="px-6 py-3 text-left text-xs font-bold text-cobli-dark uppercase tracking-wider">Data do Serviço</th>
                            <th class="px-6 py-3 text-center text-xs font-bold text-cobli-dark uppercase tracking-wider">Qtd. Dispositivos</th>
                            <th class="px-6 py-3 text-right text-xs font-bold text-cobli-dark uppercase tracking-wider">Nota Individual</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
                <div id="no-data-msg" class="p-16 text-center text-gray-400 hidden">Nenhum dado encontrado para este período.</div>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script>
        const clienteSupabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        const dateFilter = document.getElementById('date-filter');
        const adminFilter = document.getElementById('admin-filter');

        function setInitialDate() {
            const now = new Date();
            dateFilter.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        }
        setInitialDate();

        // --- LOGIN ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data: user, error } = await clienteSupabase
                .from(CONFIG.TABELA_USUARIOS)
                .select('*')
                .eq(CONFIG.COLUNA_EMAIL, document.getElementById('email').value)
                .eq(CONFIG.COLUNA_SENHA, document.getElementById('password').value)
                .single();

            if (error || !user) {
                document.getElementById('login-error').textContent = "E-mail ou senha incorretos.";
                document.getElementById('login-error').classList.remove('hidden');
            } else {
                const permissao = (user[CONFIG.COLUNA_PERMISSAO] || 'prestador').toLowerCase();
                localStorage.setItem('prestador_nome', user[CONFIG.COLUNA_NOME_PRESTADOR]);
                localStorage.setItem('prestador_perm', permissao);
                initDashboard(user[CONFIG.COLUNA_NOME_PRESTADOR], permissao);
            }
        });

        // --- DASHBOARD ---
        function initDashboard(nome, permissao) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').textContent = permissao === 'admin' ? `Admin: ${nome}` : `Olá, ${nome}`;
            
            if (permissao === 'admin') {
                document.getElementById('admin-controls').classList.remove('hidden');
                carregarListaPrestadores();
            }
            loadData();
        }

        async function carregarListaPrestadores() {
            const { data } = await clienteSupabase.from(CONFIG.TABELA_USUARIOS).select(CONFIG.COLUNA_NOME_PRESTADOR);
            if (data) {
                const nomes = [...new Set(data.map(u => u[CONFIG.COLUNA_NOME_PRESTADOR]).filter(Boolean))];
                nomes.forEach(nomeLista => {
                    const option = document.createElement('option');
                    option.value = nomeLista;
                    option.textContent = nomeLista;
                    adminFilter.appendChild(option);
                });
            }
        }

        dateFilter.addEventListener('change', loadData);
        adminFilter.addEventListener('change', loadData);

        async function loadData() {
            const nome = localStorage.getItem('prestador_nome');
            const perm = localStorage.getItem('prestador_perm');
            if (!nome) return;

            const [year, month] = dateFilter.value.split('-');
            
            let query = clienteSupabase.from('iqp').select('*')
                .gte('data_servico', `${year}-${month}-01`)
                .lte('data_servico', `${year}-${month}-31`)
                .order('data_servico', { ascending: false });

            if (perm === 'admin') {
                const prestadorEscolhido = adminFilter.value;
                if (prestadorEscolhido !== "") query = query.eq('prestador', prestadorEscolhido);
            } else {
                query = query.eq('prestador', nome);
            }

            const { data, error } = await query;
            renderDashboard(data || []);
        }

        // --- RENDERIZAR TABELA ---
        function renderDashboard(dados) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            
            if (dados.length === 0) {
                document.getElementById('no-data-msg').classList.remove('hidden');
                document.getElementById('metric-score').textContent = "0.0%";
                document.getElementById('metric-os').textContent = "0";
                document.getElementById('metric-devices').textContent = "0";
                return;
            }

            document.getElementById('no-data-msg').classList.add('hidden');
            let somaNotas = 0, totalDispositivos = 0;

            dados.forEach(os => {
                const nota = (parseFloat(os.score) || 0) * 100;
                somaNotas += nota;
                totalDispositivos += (parseInt(os.qtd_dispositivos) || 0);

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm font-semibold text-cobli-dark">${os.ordem_de_servico}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${new Date(os.data_servico).toLocaleDateString('pt-BR', { timeZone: 'UTC' })}</td>
                    <td class="px-6 py-4 text-sm text-center text-gray-600">${os.qtd_dispositivos}</td>
                    <td class="px-6 py-4 text-sm text-right font-bold ${nota >= 80 ? 'text-cobli-green' : 'text-cobli-red'}">${nota.toFixed(1)}%</td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('metric-score').textContent = `${(somaNotas / dados.length).toFixed(1)}%`;
            document.getElementById('metric-os').textContent = dados.length;
            document.getElementById('metric-devices').textContent = totalDispositivos;
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.clear();
            location.reload();
        });

        window.onload = () => {
            const salvoNome = localStorage.getItem('prestador_nome');
            const salvoPerm = localStorage.getItem('prestador_perm');
            if (salvoNome) initDashboard(salvoNome, salvoPerm);
        };
    </script>
</body>
</html>
