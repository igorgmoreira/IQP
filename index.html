<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal IQP - Cobli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script> 
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cobli-green': '#00A859',
                        'cobli-red': '#FF3B30',
                        'cobli-dark': '#1A1A1A',
                        'cobli-light': '#007AFF'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans">
    
    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-cobli-dark">Portal de Qualidade (IQP)</h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-name-display" class="font-semibold text-gray-700">A carregar...</span>
            <button onclick="fazerLogout()" class="text-sm text-cobli-red border border-cobli-red px-3 py-1 rounded hover:bg-red-50 transition">Sair</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <div class="bg-white p-4 rounded-lg shadow mb-6 flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mês</label>
                <input type="month" id="filtro-mes" class="border border-gray-300 rounded p-2 focus:ring-cobli-green focus:border-cobli-green outline-none">
            </div>
            
            <div id="container-filtro-prestador" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">Prestador (Visão Admin)</label>
                <select id="filtro-prestador" class="border border-gray-300 rounded p-2 focus:ring-cobli-green focus:border-cobli-green min-w-[250px] outline-none">
                    <option value="">Todos os Prestadores</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            
            <div id="card-score" class="bg-white p-6 rounded-lg shadow border-l-4 border-gray-300 transition-colors duration-300">
                <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Score Médio (IQP)</h3>
                <div class="flex items-center gap-3 mt-2">
                    <p id="metric-score" class="text-4xl font-bold text-gray-400 transition-colors duration-300">--</p>
                    
                    <div id="medal-badge" class="hidden px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 shadow-sm transition-colors duration-300">
                        <span id="medal-icon" class="text-lg"></span>
                        <span id="medal-text"></span>
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-red">
                <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Total de Ordens</h3>
                <p id="metric-os" class="text-4xl font-bold text-cobli-red mt-2">--</p>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-cobli-light">
                <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Qtd. Dispositivos</h3>
                <p id="metric-devices" class="text-4xl font-bold text-cobli-light mt-2">--</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ordem de Serviço</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Dispositivos</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Score</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="bg-white divide-y divide-gray-200">
                    </tbody>
            </table>
            
            <div id="no-data-msg" class="p-8 text-center text-gray-500 hidden">
                Nenhum dado encontrado para o período selecionado.
            </div>
        </div>
    </main>

    <script>
        // 1. Inicializa o Supabase
        const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let perfilUsuario = null;

        // 2. Verifica Autenticação ao carregar
        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                window.location.href = 'login.html'; // Redireciona se não estiver logado
                return;
            }

            // Puxa o perfil do banco de dados para saber se é admin ou prestador
            const { data: perfil, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', session.user.id)
                .single();

            if (perfil) {
                perfilUsuario = perfil;
                document.getElementById('user-name-display').textContent = perfil.nome_prestador;

                // Se for Admin, mostra o filtro e carrega a lista de prestadores
                if (perfil.permissao === 'admin') {
                    document.getElementById('container-filtro-prestador').classList.remove('hidden');
                    carregarListaPrestadores();
                }

                // Define o mês atual por defeito e carrega os dados
                const hoje = new Date();
                const mesAtual = `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
                document.getElementById('filtro-mes').value = mesAtual;
                
                carregarDados();
            }
        };

        // 3. Eventos dos Filtros (Atualiza quando muda o mês ou prestador)
        document.getElementById('filtro-mes').addEventListener('change', carregarDados);
        document.getElementById('filtro-prestador').addEventListener('change', carregarDados);

        // 4. Carregar Dados Principais
        async function carregarDados() {
            const mesSelecionado = document.getElementById('filtro-mes').value;
            const prestadorSelecionado = document.getElementById('filtro-prestador').value;

            // Monta a Query (Agora com o nome exato da tabela: ordem_de_servico)
            let query = supabase.from('ordem_de_servico').select('*');

            // Filtra pelo mês se houver
            if (mesSelecionado) {
                const ano = mesSelecionado.split('-')[0];
                const mes = mesSelecionado.split('-')[1];
                query = query.gte('data_servico', `${ano}-${mes}-01`)
                             .lt('data_servico', `${ano}-${String(parseInt(mes)+1).padStart(2, '0')}-01`); 
            }

            // Filtro de Segurança
            if (perfilUsuario.permissao === 'prestador') {
                query = query.eq('nome_prestador', perfilUsuario.nome_prestador);
            } else if (perfilUsuario.permissao === 'admin' && prestadorSelecionado) {
                query = query.eq('nome_prestador', prestadorSelecionado);
            }

            const { data, error } = await query;
            
            if (error) {
                console.error("Erro a buscar dados:", error);
                return;
            }

            renderDashboard(data || []);
        }

        // 5. Carregar Lista de Prestadores (Apenas Admin)
        async function carregarListaPrestadores() {
            const { data, error } = await supabase.from('profiles').select('nome_prestador').eq('permissao', 'prestador');
            if (data) {
                const select = document.getElementById('filtro-prestador');
                data.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.nome_prestador;
                    option.textContent = p.nome_prestador;
                    select.appendChild(option);
                });
            }
        }

        // 6. Atualizar a Interface (Com a Gamificação / Medalhas)
        function renderDashboard(dados) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            
            const cardScore = document.getElementById('card-score');
            const metricScore = document.getElementById('metric-score');
            const medalBadge = document.getElementById('medal-badge');
            
            if (dados.length === 0) {
                document.getElementById('no-data-msg').classList.remove('hidden');
                metricScore.textContent = "0%";
                document.getElementById('metric-os').textContent = "0";
                document.getElementById('metric-devices').textContent = "0";
                
                // Esconde a medalha se não houver dados
                medalBadge.classList.add('hidden');
                cardScore.className = "bg-white p-6 rounded-lg shadow border-l-4 border-gray-300 transition-colors duration-300";
                metricScore.className = "text-4xl font-bold text-gray-400 transition-colors duration-300";
                return;
            }

            document.getElementById('no-data-msg').classList.add('hidden');
            let somaNotas = 0, totalDispositivos = 0;

            dados.forEach(os => {
                const nota = (parseFloat(os.score) || 0) * 100;
                somaNotas += nota;
                totalDispositivos += (parseInt(os.qtd_dispositivos) || 0);

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm font-semibold text-cobli-dark">${os.ordem_de_servico || '-'}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${os.data_servico ? new Date(os.data_servico).toLocaleDateString('pt-BR', { timeZone: 'UTC' }) : '-'}</td>
                    <td class="px-6 py-4 text-sm text-gray-600 capitalize">${os.status || '-'}</td>
                    <td class="px-6 py-4 text-sm text-center text-gray-600">${os.qtd_dispositivos || 0}</td>
                    <td class="px-6 py-4 text-sm text-right font-bold ${nota >= 80 ? 'text-cobli-green' : 'text-cobli-red'}">${nota.toFixed(0)}%</td>
                `;
                tableBody.appendChild(tr);
            });

            // Lógica das Medalhas do Score Médio
            const media = somaNotas / dados.length;
            const mediaArredondada = Math.round(media);
            
            metricScore.textContent = `${mediaArredondada}%`;
            medalBadge.classList.remove('hidden');
            cardScore.className = "bg-white p-6 rounded-lg shadow border-l-4 transition-colors duration-300";

            if (mediaArredondada >= 95) {
                document.getElementById('medal-icon').textContent = '💎';
                document.getElementById('medal-text').textContent = 'Diamante';
                medalBadge.className = 'px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 shadow-sm bg-cyan-100 text-cyan-700';
                cardScore.classList.add('border-cyan-500');
                metricScore.className = 'text-4xl font-bold text-cyan-600';
            } else if (mediaArredondada >= 85) {
                document.getElementById('medal-icon').textContent = '🥇';
                document.getElementById('medal-text').textContent = 'Ouro';
                medalBadge.className = 'px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 shadow-sm bg-yellow-100 text-yellow-700';
                cardScore.classList.add('border-yellow-500');
                metricScore.className = 'text-4xl font-bold text-yellow-600';
            } else if (mediaArredondada >= 60) {
                document.getElementById('medal-icon').textContent = '🥈';
                document.getElementById('medal-text').textContent = 'Prata';
                medalBadge.className = 'px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 shadow-sm bg-gray-200 text-gray-700';
                cardScore.classList.add('border-gray-400');
                metricScore.className = 'text-4xl font-bold text-gray-600';
            } else {
                document.getElementById('medal-icon').textContent = '🥉';
                document.getElementById('medal-text').textContent = 'Bronze';
                medalBadge.className = 'px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 shadow-sm bg-orange-100 text-orange-800';
                cardScore.classList.add('border-orange-500');
                metricScore.className = 'text-4xl font-bold text-orange-600';
            }

            document.getElementById('metric-os').textContent = dados.length;
            document.getElementById('metric-devices').textContent = totalDispositivos;
        }

        // 7. Logout
        async function fazerLogout() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
